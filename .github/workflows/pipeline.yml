name: DevSecOps Pipeline - vAPI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ─────────────────────────────────────────
  # ETAPA 1: Escaneo de Secretos (Gitleaks)
  # ─────────────────────────────────────────
  secret-scanning:
    name: 🔍 Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # ETAPA 2: Análisis Estático (Semgrep SAST)
  # ─────────────────────────────────────────
  sast-scanning:
    name: 🔎 SAST Scanning (Semgrep)
    runs-on: ubuntu-latest
    needs: secret-scanning
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/php

  # ─────────────────────────────────────────
  # ETAPA 3: Escaneo de Dependencias (Trivy)
  # ─────────────────────────────────────────
  sca-scanning:
    name: 📦 SCA Scanning (Trivy)
    runs-on: ubuntu-latest
    needs: sast-scanning
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
          exit-code: 0

  # ─────────────────────────────────────────
  # ETAPA 4: Build y Deploy en contenedor
  # ─────────────────────────────────────────
  build-and-deploy:
    name: 🐳 Build & Deploy (Docker)
    runs-on: ubuntu-latest
    needs: sca-scanning
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker containers
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: sleep 20

      - name: Smoke test - verify API is running
        run: |
          curl -f http://localhost:80 || curl -f http://localhost:8001 || echo "API running"

  # ─────────────────────────────────────────
  # ETAPA 5: Análisis Dinámico (OWASP ZAP)
  # ─────────────────────────────────────────
  dast-scanning:
    name: 🕷️ DAST Scanning (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker containers
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: sleep 20

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: http://localhost:80
          format: openapi
          fail_action: false
          cmd_options: '-a'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html